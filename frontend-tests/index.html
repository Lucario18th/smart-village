<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Village - Test Suite</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🧪 Smart Village Test Suite</h1>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(event, 'login')">Login</button>
      <button class="tab-btn" onclick="switchTab(event, 'sensors')">Sensoren</button>
      <button class="tab-btn" onclick="switchTab(event, 'account')">Account</button>
    </div>

    <!-- LOGIN TAB -->
    <div id="login" class="tab-content active">
      <h2>📝 Login Test</h2>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="loginEmail" value="test@test.de" />
      </div>
      <div class="form-group">
        <label>Passwort:</label>
        <input type="password" id="loginPassword" value="test1234" />
      </div>
      <button onclick="handleLogin()">Login</button>
      <button onclick="handleLogout()">Logout</button>
      <div id="loginStatus"></div>
      <div id="loginResult"></div>
    </div>

    <!-- SENSORS TAB -->
    <div id="sensors" class="tab-content">
      <h2>📊 Sensoren Management</h2>
      <button onclick="loadSensors()">📥 Sensoren laden</button>
      <button onclick="showCreateSensorForm()">➕ Neuer Sensor</button>
      
      <div id="createSensorForm" style="display: none; margin-top: 20px;">
        <h3>Neuen Sensor erstellen</h3>
        <div class="form-group">
          <label>Sensor Name:</label>
          <input type="text" id="sensorName" placeholder="z.B. Temperatur Sensor 1" />
        </div>
        <div class="form-group">
          <label>Sensor Type ID:</label>
          <input type="number" id="sensorTypeId" placeholder="z.B. 1" value="1" />
        </div>
        <div class="form-group">
          <label>Standort:</label>
          <input type="text" id="sensorLocation" placeholder="z.B. Dachziegel" />
        </div>
        <button onclick="createSensor()">✅ Sensor erstellen</button>
        <button onclick="hideSensorForm()">❌ Abbrechen</button>
        <div id="createSensorResult"></div>
      </div>

      <div id="sensorsList" class="sensors-list"></div>
      <div id="sensorsStatus"></div>
    </div>

    <!-- ACCOUNT TAB -->
    <div id="account" class="tab-content">
      <h2>👤 Account Info</h2>
      <button onclick="loadAccountInfo()">📥 Account Daten laden</button>
      <div id="accountInfo"></div>
      <div id="accountStatus"></div>
    </div>
  </div>

  <script src="test-config.js"></script>
  <script>
    // Disable SSL verification warning in console
    if (!window.isHttps) {
      console.warn('⚠️  HTTPS mit Self-Signed Certificate. Fehler sind normal!');
    }

    // Tab Switching
    function switchTab(event, tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // LOGIN FUNCTIONS
    async function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const statusDiv = document.getElementById('loginStatus');
      const resultDiv = document.getElementById('loginResult');

      statusDiv.innerHTML = '<div class="status info"><span class="spinner"></span> Anmelden läuft...</div>';
      resultDiv.innerHTML = '';

      try {
        const response = await apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });

        setAuthToken(response.accessToken);
        statusDiv.innerHTML = '<div class="status success">✅ Anmelden erfolgreich!</div>';
        resultDiv.innerHTML = `<div class="json-box"><strong>Token:</strong> ${response.accessToken.substring(0, 50)}...</div>`;
      } catch (error) {
        statusDiv.innerHTML = `<div class="status error">❌ Fehler: ${error.message}</div>`;
      }
    }

    function handleLogout() {
      clearAuthToken();
      document.getElementById('loginStatus').innerHTML = '<div class="status info">✅ Abgemeldet</div>';
      document.getElementById('loginResult').innerHTML = '';
    }

    // SENSOR FUNCTIONS
    function showCreateSensorForm() {
      document.getElementById('createSensorForm').style.display = 'block';
    }

    function hideSensorForm() {
      document.getElementById('createSensorForm').style.display = 'none';
    }

    async function loadSensors() {
      const statusDiv = document.getElementById('sensorsStatus');
      const listDiv = document.getElementById('sensorsList');

      if (!getAuthToken()) {
        statusDiv.innerHTML = '<div class="status error">❌ Bitte zuerst anmelden!</div>';
        return;
      }

      statusDiv.innerHTML = '<div class="status info"><span class="spinner"></span> Sensoren werden geladen...</div>';
      listDiv.innerHTML = '';

      try {
        const sensors = await apiCallWithAuth('/api/sensors');
        
        if (sensors.length === 0) {
          listDiv.innerHTML = '<p>Keine Sensoren gefunden. Erstelle einen neuen!</p>';
        } else {
          listDiv.innerHTML = sensors.map(sensor => `
            <div class="sensor-card">
              <h3>${sensor.name}</h3>
              <p><strong>ID:</strong> ${sensor.id}</p>
              <p><strong>Typ:</strong> ${sensor.sensorTypeId}</p>
              <p><strong>Standort:</strong> ${sensor.location || 'N/A'}</p>
              <p><strong>Status:</strong> ${sensor.healthStatus || 'OK'}</p>
              <button onclick="deleteSensor(${sensor.id})">🗑️ Löschen</button>
            </div>
          `).join('');
        }
        statusDiv.innerHTML = '<div class="status success">✅ Sensoren geladen</div>';
      } catch (error) {
        statusDiv.innerHTML = `<div class="status error">❌ Fehler: ${error.message}</div>`;
      }
    }

    async function createSensor() {
      const name = document.getElementById('sensorName').value;
      const sensorTypeId = parseInt(document.getElementById('sensorTypeId').value);
      const location = document.getElementById('sensorLocation').value;
      const resultDiv = document.getElementById('createSensorResult');

      if (!getAuthToken()) {
        resultDiv.innerHTML = '<div class="status error">❌ Bitte zuerst anmelden!</div>';
        return;
      }

      resultDiv.innerHTML = '<div class="status info"><span class="spinner"></span> Sensor wird erstellt...</div>';

      try {
        const sensor = await apiCallWithAuth('/api/sensors', {
          method: 'POST',
          body: JSON.stringify({ name, sensorTypeId, location }),
        });

        resultDiv.innerHTML = '<div class="status success">✅ Sensor erstellt!</div>';
        document.getElementById('sensorName').value = '';
        document.getElementById('sensorLocation').value = '';
        
        setTimeout(() => {
          hideSensorForm();
          loadSensors();
        }, 1000);
      } catch (error) {
        resultDiv.innerHTML = `<div class="status error">❌ Fehler: ${error.message}</div>`;
      }
    }

    async function deleteSensor(sensorId) {
      if (!confirm('Sensor wirklich löschen?')) return;

      try {
        await apiCallWithAuth(`/api/sensors/${sensorId}`, {
          method: 'DELETE',
        });
        loadSensors();
      } catch (error) {
        alert(`Fehler beim Löschen: ${error.message}`);
      }
    }

    // ACCOUNT FUNCTIONS
    async function loadAccountInfo() {
      const statusDiv = document.getElementById('accountStatus');
      const infoDiv = document.getElementById('accountInfo');

      if (!getAuthToken()) {
        statusDiv.innerHTML = '<div class="status error">❌ Bitte zuerst anmelden!</div>';
        return;
      }

      statusDiv.innerHTML = '<div class="status info"><span class="spinner"></span> Account Daten werden geladen...</div>';
      infoDiv.innerHTML = '';

      try {
        const account = await apiCallWithAuth('/api/auth/me');
        
        infoDiv.innerHTML = `
          <div class="sensor-card">
            <h3>🔐 Account Informationen</h3>
            <p><strong>Email:</strong> ${account.email || 'N/A'}</p>
            <p><strong>ID:</strong> ${account.id || 'N/A'}</p>
            <div class="json-box">${JSON.stringify(account, null, 2)}</div>
          </div>
        `;
        statusDiv.innerHTML = '<div class="status success">✅ Account Daten geladen</div>';
      } catch (error) {
        statusDiv.innerHTML = `<div class="status error">❌ Fehler: ${error.message}</div>`;
      }
    }

    // Initialize
    console.log('Smart Village Test Suite loaded!');
    console.log('Test User: test@test.de / test1234');
  </script>
</body>
</html>
