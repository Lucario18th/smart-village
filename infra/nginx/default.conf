########################################################
# HTTP -> HTTPS Redirect
########################################################

server {
    listen 80;
    server_name smartvillage;
    return 301 https://$host$request_uri;
}

########################################################
# HTTPS-Server
########################################################

server {
    listen 443 ssl;
    server_name smartvillage;

    ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

    # Static React-Build
    root /usr/share/nginx/html;
    index index.html;

    # React SPA: Client-Side-Routing
    location / {
        try_files $uri /index.html;
    }

    # API -> Backend-Container (NestJS mit globalPrefix 'api')
    location /api/ {
        # /api/... -> /api/... (für das Backend so belassen)
        proxy_pass http://smartvillage-backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Statische Assets (optional)
    location /static/ {
        try_files $uri =404;
    }

    # Gzip (optional)
    gzip on;
    gzip_types text/css application/javascript application/json text/plain application/xml;
    gzip_min_length 256;
}
