server {
    listen 80;
    server_name _;

    # Static React-Build aus dem Frontend-Container
    # Wenn der Frontend-Container das React-Build in /usr/share/nginx/html hat:
    root /usr/share/nginx/html;
    index index.html;

    # React SPA: Client-Side-Routing
    location / {
        try_files $uri /index.html;
    }

    # API -> Backend-Container (Node/NestJS)
    location /api/ {
    proxy_pass http://smartvillage-backend:8000/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}


    # Optional: statische Assets, explizit (kann auch über / laufen)
    location /static/ {
        try_files $uri =404;
    }

    # Optional: Gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/plain application/xml;
    gzip_min_length 256;
}
