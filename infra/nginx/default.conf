########################################################
# VARIANTE B: HTTPS (PROD) – HTTP-ONLY-SERVER AUSKOMMENTIEREN
########################################################

# HTTP -> HTTPS Redirect
server {
   listen 80;
   server_name smartvillage;
   return 301 https://$host$request_uri;
}

# HTTPS-Server
server {
   listen 443 ssl;
   server_name smartvillage;

   ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
   ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

   root /usr/share/nginx/html;
   index index.html;

   location / {
       try_files $uri /index.html;
   }

   location /api/ {
       proxy_pass http://smartvillage-backend:8000/;

       proxy_http_version 1.1;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;

       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
   }

   location /static/ {
       try_files $uri =404;
   }

   gzip on;
   gzip_types text/css application/javascript application/json text/plain application/xml;
   gzip_min_length 256;
}
