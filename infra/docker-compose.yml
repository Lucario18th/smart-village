services:
  nginx:
    build:
      context: ../website
      dockerfile: Dockerfile
    container_name: smartvillage-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/smartvillage/certs:/etc/nginx/certs:ro
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smartvillage-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - /opt/smartvillage/smartvillage.env
    ports:
      - "8000:8000"
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: smartvillage-postgres
    env_file:
      - /opt/smartvillage/smartvillage.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartvillage -d smartvillage"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  smartvillage-net:

volumes:
  postgres-data:
