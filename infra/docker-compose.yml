services:
  nginx:
    build:
      context: ../website
      dockerfile: Dockerfile
    container_name: smartvillage-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smartvillage-backend
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    env_file:
      - ./smartvillage.env
    ports:
      - "8000:8000"
    volumes:
      - ./csv:/app/infra/csv:ro
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: smartvillage-postgres
    env_file:
      - ./smartvillage.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - smartvillage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartvillage -d smartvillage"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: smartvillage-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - smartvillage-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartvillage-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - smartvillage-net

networks:
  smartvillage-net:

volumes:
  postgres-data:
