version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: smartvillage-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-build:/usr/share/nginx/html:ro
    networks:
      - smartvillage-net

  frontend:
    build:
      context: ../website
      dockerfile: Dockerfile
    container_name: smartvillage-frontend
    volumes:
      - frontend-build:/usr/share/nginx/html
    networks:
      - smartvillage-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smartvillage-backend
    # env_file:
    #   - ../backend/.env
    depends_on:
      - postgres
    networks:
      - smartvillage-net

  postgres:
    image: timescale/timescaledb-postgis:latest
    container_name: smartvillage-postgres
    environment:
      POSTGRES_USER: smartvillage
      POSTGRES_PASSWORD: smartvillage
      POSTGRES_DB: smartvillage
    volumes:
      - /srv/smartvillage/postgres-data:/var/lib/postgresql/data
    networks:
      - smartvillage-net


networks:
  smartvillage-net:

volumes:
  postgres-data:
  frontend-build:
